{{ define "main" }}

<h1>{{ .Title }}</h1>

{{ range .Data.Terms.Alphabetical }}
<div class="article-listing">
    <a class="article-listing-title" href="{{ .Page.RelPermalink }}">{{ .Page.Title }}</a>
    <span class="article-listing-section">{{ .Count }} articles</span>
    {{ with .Page.Params.summary }}
    <p class="article-listing-summary">{{ . }}</p>
    {{ end }}
</div>
{{ end }}

{{ end }}
