<form
    action="/search"
    method="GET"
    class="search-form"
    role="search"
    aria-label="Site search"
>
    <label for="search-query" class="sr-only">Search the site</label>
    <input
        class="search-input"
        type="search"
        name="s"
        id="search-query"
        placeholder="Search..."
        aria-label="Search query"
    />
    <button class="search-button" type="submit" aria-label="Submit search">
        Search
    </button>
</form>
