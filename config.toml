baseURL = "https://bitsby.me/"
locale = "en-us"
title = "Bits By Me"

enableGitInfo = true

[pagination]
  pagerSize = 50

ignoreErrors = ["error-remote-getjson"]

# Allow popular.html partial to read GOAT_COUNTER_API env var.
# Hugo's default getenv allowlist is ['^HUGO_', '^CI$']; we extend it.
[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$', '^GOAT_COUNTER_API$']

[params]
    author = "Dylan Thomas"
    homeText = "Hi, I'm [Dylan](/about/). I write about operations, engineering, tools, and things I'm learning."
    dateFormat = "January 2, 2006"
    description = "Dylan Thomas writes about operations, teams, engineering, tools, and things he's learning."
    images = ["/about/headshot.png"]
    githubRepo = "https://github.com/dvhthomas/blog"
      # Default format for image conversion (e.g., "webp", "jpeg", "png"). Leave empty to disable conversion.
    defaultImageFormat = "webp"
      # GoatCounter subdomain (without .goatcounter.com). Comment out to disable analytics.
      # Snippet is only injected when hugo.IsProduction is true, so dev runs never count.
    goatcounter = "bitsby"

    [params.d2]
        theme = "3"  # https://d2lang.com/tour/themes/
        layout = "elk"  # Default layout engine (empty = default, or set to: "elk", "dagre", etc.)
        sketch = false  # Enable sketch/hand-drawn style globally
        pad = 10  # Padding in pixels around diagrams (default: 100)


[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
    [[menu.main]]
        name = "Home"
        pre = "home"
        url = "/"
        weight = 1
    [[menu.main]]
        name = "Writing"
        pre = "edit"
        url = "/writing/"
        weight = 2
    [[menu.main]]
        name = "Series"
        pre = "book"
        url = "/series/"
        weight = 3
    [[menu.main]]
        name = "About"
        pre = "user"
        url = "/about/"
        weight = 5

[taxonomies]
  tag = "tags"
  series = "series"
  capability = "capabilities"

[permalinks]
  blog = "/:year/:month/:title"
  til = "til/:year-:month-:day/:slug"
  recipes = "/recipes/:slug"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
    style = "github"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
